<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://www.gstatic.com 'unsafe-inline';">
    <title>Advanced Search</title>
    <link rel="stylesheet" href="advanced.css">
</head>
<body>
    <div class="header">
        <img src="google logo.png" alt="">
        <a href="index.html">Google Search</a>
    </div>
    <h4>Advanced Search</h4>
    <p>Find pages with...</p>
    <form action="https://google.com/search">
        <div class="container">
            <div class="flex-row">
                <p>all these words: </p>
                <input type="text" id="allwords" >
            </div>
            <div class="flex-row">
                <p>this exact word or phrase: </p>
                <input type="text" id="exactword">
            </div>
            <div class="flex-row">
                <p>any of these words: </p>
                <input type="text" id="anyword">
            </div>
            <div class="flex-row">
                <p>none of these words: </p>
                <input type="text" id="nonewords">
            </div>
            <button class="advanced-btn">Advanced Search</button>
        </div>
    </form>

    <script src="script.js"></script>
</body>
</html>
