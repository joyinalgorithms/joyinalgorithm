{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit Page
{% endblock %}

{% block body %}
    <h1>Edit page: {{ title }}</h1>
    <form action="{% url 'editpage' title %}" method="post">
        <div class="newpage-container">
            {% csrf_token %}
            {{ form }}
            <input type="submit" value="Submit">
        </div>
    </form>
{% endblock %}
